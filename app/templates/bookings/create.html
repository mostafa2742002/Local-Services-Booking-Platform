{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/booking/bookings_create.css') }}">
{% endblock %}

{% block content %}

<section class="page-header">
    <h1>Book Service</h1>
    <p>Send a booking request to the provider.</p>
</section>

<section class="booking-form-section">
    <div class="booking-card">
        <h2>{{ service.name }}</h2>

        <p>
            <strong>Category:</strong>
            {{ service.category }}
        </p>

        <p>
            <strong>Price:</strong>
            {{ service.price }} EGP
        </p>

        <p>
            <strong>Duration:</strong>
            {{ service.duration_minutes }} minutes
        </p>

        <form
            action="{{ url_for('bookings.submit_create_booking_form', service_id=service.id) }}"
            method="post"
            class="booking-form"
            data-booking-form
            id="booking-form"
        >
            <div class="form-group">
                <label for="booking_date">Booking Date</label>
                <input
                    type="date"
                    id="booking_date"
                    name="booking_date"
                    value="{{ booking_date or '' }}"
                >
            </div>

            <div class="form-group">
                <label for="booking_time">Booking Time</label>
                <input
                    type="time"
                    id="booking_time"
                    name="booking_time"
                    value="{{ booking_time or '' }}"
                >
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input
                    type="text"
                    id="address"
                    name="address"
                    value="{{ address or '' }}"
                    placeholder="Enter your address"
                >
            </div>

            <div class="form-group">
                <label for="problem_description">Problem Description</label>
                <textarea
                    id="problem_description"
                    name="problem_description"
                    placeholder="Describe the problem or service details"
                >{{ problem_description or '' }}</textarea>
            </div>

            <div class="form-group">
                <label for="phone_number">Phone Number</label>
                <input
                    type="text"
                    id="phone_number"
                    name="phone_number"
                    value="{{ phone_number or '' }}"
                    placeholder="Enter your phone number"
                >
            </div>

            <button type="submit" class="primary-btn">
                Submit Booking Request
            </button>
        </form>
    </div>
</section>

<script src="{{ url_for('static', filename='js/booking_draft.js') }}"></script>

{% endblock %}
