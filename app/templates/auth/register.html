
{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p>Register as a customer to start booking local services.</p>

        <form action="{{ url_for('users.submit_register_form') }}" method="post" class="auth-form">

            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >
            
            <div class="form-group">
                <label for="name">Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    value="{{ name or '' }}"
                    placeholder="Enter your name"
                >
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ email or '' }}"
                    placeholder="Enter your email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                >
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Confirm your password"
                >
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" name="role">
                    <option value="customer" {% if role == 'customer' %}selected{% endif %}>Customer</option>
                    <option value="provider" {% if role == 'provider' %}selected{% endif %}>Service Provider</option>
                </select>   
            </div>

            <button type="submit" class="primary-btn">Register</button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{{ url_for('users.show_login_page') }}">Login</a>
        </p>
    </div>
</section>

{% endblock %}
