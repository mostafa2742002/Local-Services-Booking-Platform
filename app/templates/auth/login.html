{% extends "base.html" %}

{% block styles %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1>Login</h1>
        <p>Login to manage your bookings and services.</p>

        <form action="{{ url_for('users.submit_login_form') }}" method="post" class="auth-form">
            
            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ email or '' }}"
                    placeholder="Enter your email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                >
            </div>

            <button type="submit" class="primary-btn">Login</button>
        </form>

        <p class="auth-switch">
            Don't have an account?
            <a href="{{ url_for('users.show_register_page') }}">Register</a>
        </p>
    </div>
</section>

{% endblock %}
